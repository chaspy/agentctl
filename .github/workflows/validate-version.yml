name: Validate Version

on:
  pull_request:
    branches: [main]

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION file was changed
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^VERSION$'; then
            echo "VERSION file was updated."
          else
            echo "::error::VERSION file was not changed. Please bump the version in the VERSION file."
            exit 1
          fi

      - name: Validate VERSION format
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION file must contain a valid semver (e.g., 0.2.0). Got: $version"
            exit 1
          fi
          echo "Version: $version"

      - name: Check version is not already tagged
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          if git tag -l "v$version" | grep -q .; then
            echo "::error::Tag v$version already exists. Please bump to a new version."
            exit 1
          fi
          echo "v$version is not yet tagged. Good."
